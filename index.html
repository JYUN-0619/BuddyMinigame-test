<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | Buddy Minigame</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-analytics-compat.js"></script>

    <script>
      const firebaseConfig = {
  apiKey: "AIzaSyC3QwM3qbyvQjuOcA9FyDdAAZ4jPHFpeS0",
  authDomain: "buddy-minigame-v3.firebaseapp.com",
  projectId: "buddy-minigame-v3",
  storageBucket: "buddy-minigame-v3.firebasestorage.app",
  messagingSenderId: "348342449242",
  appId: "1:348342449242:web:409b8df00c8349493cd463",
  measurementId: "G-E9LD6YB83T"
};

      firebase.initializeApp(firebaseConfig);
      const analytics = firebase.analytics();

      window._unityMessageQueue = [];
      window._unityReady = false;

      window.sendToUnity = function(objName, method, param) {
        if (window._unityReady && window.unityInstance) {
          window.unityInstance.SendMessage(objName, method, param);
        } else {
          window._unityMessageQueue.push({ objName, method, param });
        }
      };

      window.onUnityReady = function() {
        window._unityReady = true;
        window._unityMessageQueue.forEach(function(msg) {
          window.unityInstance.SendMessage(msg.objName, msg.method, msg.param);
        });
        window._unityMessageQueue = [];
      };
    </script>

  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
    </div>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var container = document.querySelector("#unity-container");

      // ─── Universal aspect-ratio resize ───────────────────────────────────
      var TARGET_ASPECT = 9 / 16; // portrait 9:16

      function resizeCanvas() {
        var windowW = window.innerWidth;
        var windowH = window.innerHeight;
        var windowAspect = windowW / windowH;

        var canvasW, canvasH;

        if (windowAspect > TARGET_ASPECT) {
          // Window wider than 9:16 — constrain by height, pillarbox
          canvasH = windowH;
          canvasW = canvasH * TARGET_ASPECT;
        } else {
          // Window taller than 9:16 — constrain by width, letterbox
          canvasW = windowW;
          canvasH = canvasW / TARGET_ASPECT;
        }

        canvas.style.width  = canvasW + "px";
        canvas.style.height = canvasH + "px";
        container.style.width  = canvasW + "px";
        container.style.height = canvasH + "px";
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);
      
      // Fixes the rotation calculation on mobile
      window.addEventListener('orientationchange', function() {
        setTimeout(resizeCanvas, 100); 
      });
      // ─────────────────────────────────────────────────────────────────────

      function unityShowBanner(msg, type) {
        var warningBanner = document.querySelector("#unity-warning");
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Web.loader.js";
      var config = {
        arguments: [],
        dataUrl: buildUrl + "/Web.data",
        frameworkUrl: buildUrl + "/Web.framework.js",
        codeUrl: buildUrl + "/Web.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Buddy Minigame",
        productVersion: "1.0",
        showBanner: unityShowBanner,
        
        // Cap the ratio at 1.5 to prevent texture memory crashes and scaling bugs!
        devicePixelRatio: Math.min(window.devicePixelRatio || 1, 1.5)
      };

      document.querySelector("#unity-loading-bar").style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
        }).then((unityInstance) => {
          window.unityInstance = unityInstance;
          document.querySelector("#unity-loading-bar").style.display = "none";

        }).catch((message) => {
          alert(message);
        });
      };

      document.body.appendChild(script);
    </script>
  </body>
</html>
